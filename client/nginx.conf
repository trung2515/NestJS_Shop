server {
  listen 80;
  server_name web.trungpd.icd;

  root /usr/share/nginx/html;
  index index.html;

  # API Calls từ Frontend (React/Vue/Vite)
  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://server:4001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Thêm block này để catch các API call trực tiếp từ Swagger 
  # (nếu Swagger gọi thẳng /rest-api-demo thay vì qua /api)
  location /rest-api-demo {
    proxy_pass http://server:4001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Các block docs
  location ^~ /docs {
    proxy_pass http://server:4001;
  }
  
  location = /docs-json {
    proxy_pass http://server:4001/docs-json;
  }

  # Phục vụ Frontend
  location / {
    try_files $uri $uri/ /index.html;
  }
}