services:
  postgres:
    image: postgres:16-alpine
    container_name: shopnest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shopnest
      POSTGRES_PASSWORD: shopnest123
      POSTGRES_DB: shopnest
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shopnest -d shopnest']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: shopnest-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@shopnest.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres-data:
